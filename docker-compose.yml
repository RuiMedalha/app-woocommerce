# Hotelequip Optimizer — deploy isolado no VPS
# Frontend servido pelo backend (porta 4000). Mapeamento: 5173 e 4000 no host.
# Nginx Proxy Manager encaminha app.hotelequip.pt para 172.17.0.1:5173

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Vazio = front usa caminhos relativos à raiz (/api/upload). Evita duplicação api/api.
        VITE_API_URL: ${VITE_API_URL:-}
    image: hotelequip-optimizer:latest
    container_name: hotelequip-optimizer
    restart: unless-stopped
    ports:
      - "5173:4000"   # NPM (app.hotelequip.pt) -> host:5173 -> container:4000
      - "4000:4000"   # Backend API (acesso direto se necessário)
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_PATH: /data/database/hotelequip.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - hotelequip-database:/data/database   # SQLite persistente (fora do container)
      - hotelequip-uploads:/data/uploads    # PDFs/Excels persistentes (fora do container)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  hotelequip-database:
  hotelequip-uploads:
